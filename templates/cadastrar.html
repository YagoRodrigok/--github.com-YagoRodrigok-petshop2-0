<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Pet</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="container py-4">
    <h1 class="mb-4">Cadastrar novo pet</h1>
    <form method="post" class="mb-3">
        <div class="mb-3">
            <label class="form-label">Nome do pet:</label>
            <input type="text" name="nome" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Espécie:</label>
            <input type="text" name="especie" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Nome do dono:</label>
            <input type="text" name="dono" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Tipo de serviço:</label>
            <select name="servico" class="form-control" required>
                <option value="">Selecione...</option>
                <option value="Banho">Banho</option>
                <option value="Tosa">Tosa</option>
                <option value="Veterinário">Veterinário</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Horário:</label>
            <select name="horario" class="form-control" required>
                <option value="">Selecione...</option>
                <option value="08:00">08:00</option>
                <option value="09:00">09:00</option>
                <option value="10:00">10:00</option>
                <option value="14:00">14:00</option>
                <option value="15:00">15:00</option>
                <option value="16:00">16:00</option>
            </select>
        </div>
        <button type="submit" class="btn btn-success">Cadastrar</button>
        <a href="/" class="btn btn-secondary">Voltar</a>
    </form>
</body>
</html>
