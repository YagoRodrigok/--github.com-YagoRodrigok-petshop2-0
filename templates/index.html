<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Petshop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f0f8ff 0%, #e6f3ff 100%);
        }
        .pet-card {
            box-shadow: 0 4px 16px rgba(74,144,226,0.10);
            border-radius: 16px;
            margin-bottom: 24px;
            border: none;
        }
        .pet-card .card-title {
            font-size: 1.4em;
            color: #357abd;
        }
        .pet-card .badge {
            font-size: 1em;
        }
    </style>
</head>
<body class="container py-4">
    <div class="text-center mb-4">
        <h1 class="display-5">🐾 Petshop</h1>
        <p class="lead">Gerencie os pets, serviços e horários do seu petshop!</p>
        <a href="/cadastrar" class="btn btn-success">Cadastrar novo pet</a>
    </div>
    <h2 class="mb-4">Pets cadastrados:</h2>
    <div class="row">
        {% for pet in pets %}
        <div class="col-md-6 col-lg-4">
            <div class="card pet-card">
                <div class="card-body">
                    <h5 class="card-title">
                        <a href="/detalhes/{{ loop.index0 }}" style="text-decoration:none; color:#357abd;">
                            {{ pet.nome }} <span class="badge bg-info text-dark">{{ pet.especie }}</span>
                        </a>
                    </h5>
                    <p class="card-text mb-1"><strong>Dono:</strong> {{ pet.dono }}</p>
                    <p class="card-text mb-1"><strong>Serviço:</strong> <span class="badge bg-primary">{{ pet.servico }}</span></p>
                    <p class="card-text mb-2"><strong>Horário:</strong> <span class="badge bg-warning text-dark">{{ pet.horario }}</span></p>
                    <div class="d-flex justify-content-end">
                        <form method="post" action="/remover/{{ loop.index0 }}" style="margin:0;">
                            <button type="submit" class="btn btn-outline-danger btn-sm">Remover</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        {% else %}
        <div class="col-12">
            <div class="alert alert-info text-center">Nenhum pet cadastrado.</div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
