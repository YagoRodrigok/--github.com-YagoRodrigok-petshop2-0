<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Pet</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="container py-4">
    <h1 class="mb-4">Editar Pet</h1>
    <form method="post" class="mb-3">
        <div class="mb-3">
            <label class="form-label">Nome do pet:</label>
            <input type="text" name="nome" class="form-control" value="{{ pet.nome }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Espécie:</label>
            <input type="text" name="especie" class="form-control" value="{{ pet.especie }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Nome do dono:</label>
            <input type="text" name="dono" class="form-control" value="{{ pet.dono }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Tipo de serviço:</label>
            <select name="servico" class="form-control" required>
                <option value="">Selecione...</option>
                <option value="Banho" {% if pet.servico == 'Banho' %}selected{% endif %}>Banho</option>
                <option value="Tosa" {% if pet.servico == 'Tosa' %}selected{% endif %}>Tosa</option>
                <option value="Veterinário" {% if pet.servico == 'Veterinário' %}selected{% endif %}>Veterinário</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Horário:</label>
            <select name="horario" class="form-control" required>
                <option value="">Selecione...</option>
                <option value="08:00" {% if pet.horario == '08:00' %}selected{% endif %}>08:00</option>
                <option value="09:00" {% if pet.horario == '09:00' %}selected{% endif %}>09:00</option>
                <option value="10:00" {% if pet.horario == '10:00' %}selected{% endif %}>10:00</option>
                <option value="14:00" {% if pet.horario == '14:00' %}selected{% endif %}>14:00</option>
                <option value="15:00" {% if pet.horario == '15:00' %}selected{% endif %}>15:00</option>
                <option value="16:00" {% if pet.horario == '16:00' %}selected{% endif %}>16:00</option>
            </select>
        </div>
        <button type="submit" class="btn btn-success">Salvar</button>
        <a href="/" class="btn btn-secondary">Voltar</a>
    </form>
</body>
</html>
