<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento - PetShop Cuidar</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>


    <header>
        <nav>
            <div class="container">
                <h1>🐾 PetShop Cuidar</h1>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="index.html#servicos">Serviços</a></li>
                    <li><a href="cadastro.html">Cadastro</a></li>
                    <li><a href="agendamento.html" class="active">Agendar</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <section class="form-section">
            <div class="container">
                <div class="form-wrapper">
                    <h2>📅 Agendar Serviço</h2>
                    <form id="form-agendamento" class="form-container">
                        <div class="form-group">
                            <label for="cliente-select">Cliente *</label>
                            <select id="cliente-select" name="cliente_id" required>
                                <option value="">Selecione um cliente</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="pet-select">Pet *</label>
                            <select id="pet-select" name="pet_id" required disabled>
                                <option value="">Primeiro selecione um cliente</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="servico">Serviço *</label>
                            <select id="servico" name="servico" required>
                                <option value="">Selecione um serviço</option>
                                <option value="Banho & Tosa">🛁 Banho & Tosa - R$ 35,00</option>
                                <option value="Banho Simples">🚿 Banho Simples - R$ 25,00</option>
                                <option value="Tosa Higiênica">✂️ Tosa Higiênica - R$ 20,00</option>
                                <option value="Consulta Veterinária">🩺 Consulta Veterinária - R$ 80,00</option>
                                <option value="Vacinação">💉 Vacinação - R$ 45,00</option>
                                <option value="Day Care">🏠 Day Care - R$ 50,00</option>
                                <option value="Hotel Pet">🏨 Hotel Pet - R$ 60,00</option>
                                <option value="Corte de Unhas">💅 Corte de Unhas - R$ 15,00</option>
                                <option value="Limpeza de Ouvido">👂 Limpeza de Ouvido - R$ 20,00</option>
                            </select>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="data">Data *</label>
                                <input type="date" id="data" name="data" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="hora">Horário *</label>
                                <select id="hora" name="hora" required>
                                    <option value="">Selecione</option>
                                    <option value="08:00">08:00</option>
                                    <option value="08:30">08:30</option>
                                    <option value="09:00">09:00</option>
                                    <option value="09:30">09:30</option>
                                    <option value="10:00">10:00</option>
                                    <option value="10:30">10:30</option>
                                    <option value="11:00">11:00</option>
                                    <option value="11:30">11:30</option>
                                    <option value="13:00">13:00</option>
                                    <option value="13:30">13:30</option>
                                    <option value="14:00">14:00</option>
                                    <option value="14:30">14:30</option>
                                    <option value="15:00">15:00</option>
                                    <option value="15:30">15:30</option>
                                    <option value="16:00">16:00</option>
                                    <option value="16:30">16:30</option>
                                    <option value="17:00">17:00</option>
                                    <option value="17:30">17:30</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="observacoes">Observações</label>
                            <textarea id="observacoes" name="observacoes" rows="3" placeholder="Informações adicionais sobre o pet ou serviço..."></textarea>
                        </div>
                        
                        <button type="submit" class="btn primary">Agendar Serviço</button>
                    </form>

                    <div id="agendamento-result" class="result-message"></div>
                </div>

                <div class="agenda-preview">
                    <h3>📋 Agendamentos do Dia</h3>
                    <div id="agendamentos-hoje" class="agendamentos-list">
                        <p>Carregando...</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 PetShop Cuidar. Todos os direitos reservados.</p>
            <p>📞 (11) 99999-9999 | 📧 contato@petshopcuidar.com.br</p>
        </div>
    </footer>

    <script>
        // Carregar clientes
        async function carregarClientes() {
            try {
                const response = await fetch('http://localhost:5000/api/clientes');
                const clientes = await response.json();
                
                const select = document.getElementById('cliente-select');
                select.innerHTML = '<option value="">Selecione um cliente</option>';
                
                clientes.forEach(cliente => {
                    const option = document.createElement('option');
                    option.value = cliente.id;
                    option.textContent = cliente.nome;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Erro ao carregar clientes:', error);
            }
        }

        // Carregar pets do cliente selecionado
        document.getElementById('cliente-select').addEventListener('change', async (e) => {
            const clienteId = e.target.value;
            const petSelect = document.getElementById('pet-select');
            
            if (!clienteId) {
                petSelect.innerHTML = '<option value="">Primeiro selecione um cliente</option>';
                petSelect.disabled = true;
                return;
            }
            
            try {
                const response = await fetch(`http://localhost:5000/api/pets/${clienteId}`);
                const pets = await response.json();
                
                petSelect.innerHTML = '<option value="">Selecione um pet</option>';
                
                pets.forEach(pet => {
                    const option = document.createElement('option');
                    option.value = pet.id;
                    option.textContent = `${pet.nome} (${pet.especie})`;
                    petSelect.appendChild(option);
                });
                
                petSelect.disabled = false;
            } catch (error) {
                console.error('Erro ao carregar pets:', error);
                petSelect.innerHTML = '<option value="">Erro ao carregar pets</option>';
            }
        });

        // Agendar serviço
        document.getElementById('form-agendamento').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            data.cliente_id = parseInt(data.cliente_id);
            data.pet_id = parseInt(data.pet_id);
            
            try {
                const response = await fetch('http://localhost:5000/api/agendamentos', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                const resultDiv = document.getElementById('agendamento-result');
                
                if (result.success) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            ✅ Agendamento realizado com sucesso!<br>
                            <strong>Serviço:</strong> ${result.agendamento.servico}<br>
                            <strong>Data:</strong> ${formatarData(result.agendamento.data)} às ${result.agendamento.hora}<br>
                            <strong>ID:</strong> ${result.agendamento.id}
                        </div>
                    `;
                    e.target.reset();
                    document.getElementById('pet-select').disabled = true;
                    carregarAgendamentosHoje();
                } else {
                    resultDiv.innerHTML = `<div class="error">❌ Erro: ${result.error}</div>`;
                }
            } catch (error) {
                document.getElementById('agendamento-result').innerHTML = `<div class="error">❌ Erro ao agendar: ${error.message}</div>`;
            }
        });

        // Carregar agendamentos de hoje
        async function carregarAgendamentosHoje() {
            try {
                const response = await fetch('http://localhost:5000/api/agendamentos');
                const agendamentos = await response.json();
                
                const hoje = new Date().toISOString().split('T')[0];
                const agendamentosHoje = agendamentos.filter(ag => ag.data === hoje);
                
                const container = document.getElementById('agendamentos-hoje');
                
                if (agendamentosHoje.length === 0) {
                    container.innerHTML = '<p class="no-data">Nenhum agendamento para hoje.</p>';
                    return;
                }
                
                container.innerHTML = agendamentosHoje.map(ag => `
                    <div class="agendamento-item">
                        <strong>${ag.hora}</strong> - ${ag.servico}<br>
                        <small>${ag.cliente_nome} com ${ag.pet_nome}</small>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Erro ao carregar agendamentos:', error);
                document.getElementById('agendamentos-hoje').innerHTML = '<p class="error">Erro ao carregar agendamentos.</p>';
            }
        }

        function formatarData(data) {
            const [ano, mes, dia] = data.split('-');
            return `${dia}/${mes}/${ano}`;
        }

        // Definir data mínima como hoje
        document.getElementById('data').min = new Date().toISOString().split('T')[0];

        // Carregar dados ao iniciar
        document.addEventListener('DOMContentLoaded', () => {
            carregarClientes();
            carregarAgendamentosHoje();
        });
    </script>
</body>
</html>
